    "setuptools",
    "zope.event",
    "zope.interface",
]

[[package]]
name = "greenlet"
version = "2.0.1"
requires_python = ">=2.7,!=3.0.*,!=3.1.*,!=3.2.*,!=3.3.*,!=3.4.*"
