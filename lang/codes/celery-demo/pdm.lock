dependencies = [
    "vine>=5.0.0",
]

[[package]]
name = "async-timeout"
version = "4.0.2"
requires_python = ">=3.6"
summary = "Timeout context manager for asyncio programs"

[[package]]
name = "billiard"
version = "3.6.4.0"
summary = "Python multiprocessing fork with improvements and bugfixes"

[[package]]
name = "celery"
version = "5.2.7"
requires_python = ">=3.7"
summary = "Distributed Task Queue."
dependencies = [
    "billiard<4.0,>=3.6.4.0",
    "click-didyoumean>=0.0.3",
    "click-plugins>=1.1.1",
    "click-repl>=0.2.0",
    "click<9.0,>=8.0.3",
    "kombu<6.0,>=5.2.3",
    "pytz>=2021.3",
    "vine<6.0,>=5.0.0",
]

[[package]]
name = "celery"
version = "5.2.7"
