<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Layout Example</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <div class="col p-0">
                <header class="bg-primary text-white p-3">
                    Header Content
                </header>
            </div>
        </div>

        <div class="row">
            <div class="col-2 p-0">
                <aside class="bg-light p-3">
                    <ul>
                        <li><a href="#" id="module1">Module 1</a></li>
                        <li><a href="#" id="module2">Module 2</a></li>
                        <li><a href="#" id="module3">Module 3</a></li>
                    </ul>
                </aside>
            </div>
            <div class="col-9" id="mainContent">
                <main class="p-3">
                    Main Content
                </main>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('module1').addEventListener('click', function () {
            document.getElementById('mainContent').innerHTML = 'Main Content for Module 1';
        });

        document.getElementById('module2').addEventListener('click', function () {
            document.getElementById('mainContent').innerHTML = 'Main Content for Module 2';
        });

        document.getElementById('module3').addEventListener('click', function () {
            document.getElementById('mainContent').innerHTML = 'Main Content for Module 3';
        });
    </script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
