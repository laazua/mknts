# reverse_proxy_1
server {
	listen    80;
	server_name    localhost;
	location / {
		root    html;
		proxy_pass    http://127.0.0.1:8080;   #访问虚拟机80端口会转发到8080端口
		index    index.html index.htm;
	}
}


# reverse_proxy_2
server {
	listern    9001;
	server_name    localhost;
	location ~ /edu/ {    #访问的url中包含/edu/转发到127.0.0.1:8080
		proxy_pass  http://127.0.0.1:8080;
	}

	location ~ /vod/ {   #访问的url中包含/vod/转发到127.0.0.01:8081
		proxy_pass  http://127.0.0.1:8081;
	}
}


# 负载均衡
# 分配服务器策略:轮询(轮询),权重(weight=10),ip_hash(解决session),fair(根据响应时间分配)
http {
	upstream myserver {  # 负载均衡服务器列表
		ip_hash;     # 负载均衡策略，根据ip_hash进行负载均衡(可根据实际情况选择规则)
		server 192.168.1.1:8080;
		server 192.168.1.2:8081;
	}
	
	server {
		listen    80;
 		server_name    localhost;
		location / {
			proxy_pass  http://myserver;
			proxy_connect_timeout  10;
			root  html;
			index  index.html index.htm;
		}
	}
}


# 动静分离
# 静态资源和动态资源分开，分别放在不同的服务器上;提高访问效率.
# 以下是静态资源访问配置
# 测试 http://127.0.0.1/image/1.jpg
#      http://127.0.0.1/www/a.html
server {
	listen    80;
	server_name    localhost;
	location /www/ {
		root  /data/;
		index  index.html index.htm;
	}

	location /image/ {
		root  /data/;
		autoindex  on;
	}
}


# 高可用(2台nginx代理服务器做转发,主备模式;主备服务器上安装nginx,keepalived)
# keepalived.conf
global_defs {
	# 默认即可
	router_id LVS_DEVELBACK
}

vrrp_script chk_http_port {
	# nginx服务脚本检测
	script "/root/scripts/nginx_check.sh"
	interval  2
	weight  2
}

vrrp_instance_VI_1 {
	state  MASTER    # 备份服务器上将MASTER改为BACKUP
	interface  ens33    # 网卡
	virtual_router_id  51    # 主,备服务器的virtual_router_id必须相同
	priority  100    # 主,备服务器取不同的优先级,主服务器值较大,备份服务器值较小
	advert_int  1
	authentication {
		auth_type  PASS
		auth_pass  123456
	}
	virtual_ipaddress {
		192.168.1.1    # VRRP H虚拟地址,此ip将绑定到两台nginx所在服务器
	}
}
# nginx_check.sh
#!/bin/bash
A=$(PS -C nginx -no-header|wc -l)
if [ $A -eq 0 ];then
	/usr/local/nginx/sbin/nginx
	sleep 2
	B=$(PS -C nginx -no-header|wc -l)
	if [ $B -eq 0 ];then
		killall keepalived
	fi
fi


# nginx原理
master类似管理员,分配工作(worker根据争抢机制获取master分配的工作)
worker类似员工,做master分配的工作; worker数量与cpu核心数一致(worker_processes 4 指令设置; worker_cpu_affinity 0001 0010 0100 1000)

一个请求,会让一个worker占用几个连接数(2个或4个)
最大迸发：worker_connections * worker_processes/4(动态资源访问除以4,静态资源访问除以2)
