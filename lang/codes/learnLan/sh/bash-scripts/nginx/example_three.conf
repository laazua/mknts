# 基于ip的多个虚拟机

server {
    listen    192.168.7.21:80;
    location / {
        root    html/web1;
        index   index.html index.htm index.php;
    }
}

server {
    listen    192.168.7.22:80;
    location / {
        root    html/web2;
        index   index.html index.htm;
    }
}

# 基于端口的多个虚拟机

server {
    listen         80;
    server_name    www.test.missu.com
    location / {
        root  html/web1;
        index index.html index.htm index.php;
    }
}

server {
    listen         8080;
    server_name    www.test.missu.com;
    location / {
        root  html/web2;
        index index.html index.htm;
    }
}

# 基于域名的虚拟机

server {
    listen        80;
    server_name   web1.missu.com;
    location / {
        root  html/web1;
        index index.html index.htm index.php;
    }
}

server {
    listen        80;
    server_name   web2.missu.com;
    location / {
        root  html/web2;
        index index.html index.htm index.php;
    }
}

