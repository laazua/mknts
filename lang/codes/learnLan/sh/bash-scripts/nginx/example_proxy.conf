# 反向代理
location / {
    index    index.php index.html index.htm;    # 定义首页索引文件
    proxy_pass    http://server;    # 请求server定义的服务器列表

    # 代理优化
    proxy_set_header  Host  $host;    # 修改请求头,添加Host字段
    proxy_set_header  X-Real-IP  $remote_addr;    # 修改请求头,添加X-Real-IP字段
    proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;    # 修改请求头,添加X-Forwarded-For字段
    client_max_body_size  10m;    # 允许客户端请求的最大单文件字节数
    client_body_buffer_size  128k;    # 缓冲区代理缓冲用户端请求的最大字节数
    proxy_connect_timeout  90;    # nginx跟后端服务器连接超时时间
    proxy_send_timeout  90;    # 后端服务器数据回传超时时间
    proxy_read_timeout  90;    # 连接成功后,后端服务器响应时间
    proxy_buffer_size  4k;    # 设置代理服务器保存用户头信息的缓冲区大小
    proxy_buffers  4  32k;    # proxy_buffers缓冲区,网页平均在32k以下,可以这样设置
    proxy_busy_buffers_size  64k;    # 高负荷下缓冲大小(proxy_buffers*2)
    proxy_temp_file_write_size  64k;    # 设定缓存文件大小,大于这个值,将从upstream服务器传 
}