# 限速：限制某个用户在一个给定时间段能够产生的HTTP请求数量

# 模块:
# limit_req_zone: 限制单位时间内的请求数,即限制速率, 采用漏桶算法
# limit_req_conn: 限制同一时间连接数,即并发限制

# 应用场景:
# 下载限速: 限制现在速度即并发连接数,应用在下载服务器中,保护带宽及服务器的IO资源
# 请求限速: 限制单位时间内用户的请求访问,防止恶意攻击,保护服务器及资源安全

# 实现

# 限制单位时间内请求数限制
http {
    # $binary_remote_addr表示通过remote_addr来做限制标识;zone=baism:10m表示生成一个大小为10M,名字为one的
    # 内存区域,用来存储访问的频次信息;rate=1r/s表示允许相同标识的客户端的访问频次,这里是每秒1次.
    limit_req_zone  $binary_remote_addr  zone=baism:10m  rate=1r/s;
    server {
        location /a {
            # zone=baism设置使用哪个配置区域来做限制,与上面limit_req_zone指令中的zone参数一致;burst=5,设置
            # 一个大小为5的缓冲区,当有大量请求过来时,超过访问频次的请求可以先放到这个缓冲区内；nodelay表示访问
            # 频次超过而且缓冲区也满了的时候就直接返回503,如果没有设置所有的请求都会排队.
            limit_req  zone=baism  burst=5  nodelay;
        }
    }
}

# 限制并发连接数
# 基于IP做限制连接,限制同一IP并发为1
http {
    limit_req_zone  $binary_remote_addr  zone=addr:10m;
    server {
        listen    80;
        server_name  localhost;
        location / {
            root  html;
            index  index.html index.htm;
        }

        location /abc {
            limit_conn  addr 1;
        }
    }
}

# 限制下载速度
server {
    listen    80;
    server_name  location;
    location / {
        root  html;
        index  index.html index.htm;
    }
    location /abc {
        limit_rate  100k;
    }
}