# url重写: 将http://www.missu.com重写为http://www.missu.com/basim
location / {
    set  $name  baism;
    rewrite  ^(.*)$  http://www.missu.com/$name
}


# 模糊匹配: ~匹配, !~不匹配, ~*不区分大小写匹配
# 精确匹配: =, !=
location / {
    root  html;
    index  index.html index.htm;
    if ($http_user_agent ~* 'Chrome') {
        break;
        return 403;
        # return http://www.missu.com;
    }
}

# rewrite  <regex>  <replacement>  [flag];
# flag:
# last        本条规则匹配完成后,继续向下匹配新的location URI规则
# break       本条规则匹配完成后即终止,不再匹配后面的任何规则
# redirect    返回302临时重定向,浏览器地址会显示跳转后的URL地址
# permanent   返回301永久重定向,浏览器地址会显示跳转后的URL地址

# 域名跳转,将www.jd.com重写为www.missu.com
server {
    listen    80;
    server_name  www.jd.com;
    location / {
        rewrite  ^/$  http://www.missu.com  permanent;
    }
}