# 访问控制
location /test {
    autoindex        on;
    allow            192.168.7.0/24;
    deny             all;

    # 基于客户端IP做过滤,符合条件的允许访问,不符合的返回404;
    if ($remote_addr !~ "192.168.10") {
        # return 404;
        return http://test.missu.com;
    }
}

# 登录验证
location /b {
    auth_basic    "login auth";
    auth_basic_user_file    /etc/nginx/htpasswd;
}