# 默认网站
server {
    listen         80;
    server_name    localhost;
    location / {
        root         html;
        index        index.html index.htm;
        autoindex    on;    # 支持目录浏览
    }

    error_page    500 502 503 504    /50x.html;
    location = /50x.html {
        root         html;
    }
}