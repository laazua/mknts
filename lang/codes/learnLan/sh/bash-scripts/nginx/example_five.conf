# nginx 调优.不能脱离业务调优
# 不同的业务设置的参数值不同,脱离业务谈调优是耍流氓.

# nginx工作模式: master + workers

# 启动工作进程数量
worker_processes  4;
# 指定运行核的编号,用掩码的方式设置编号
worker_cpu_affinity  0001 0010 0100 1000;
# 单个工作进程维护的请求队列长度
events {
    worker_connections  1024;
}
# 长连接,减少服务器与客户端建立的http连接产生的大量tcp三次握手四次断开的开销
keepalive_timeout  0;    # 0代表关闭
# keepalive_timeout  1024;
# 压缩: 降低传输时间,降低宽带费用
gzip  on;
gzip_proxied  any;

# 启用gzip压缩的最小文件,小于设置值的文件将不会压缩
gzip_min_length  1k;

# 设置压缩所需要的缓冲区大小
gzip_buffers  32 8k;

# gzip压缩级别,1-9,数字越大压缩越好,也越占用cpu时间
gzip_comp_level  6;
# 进行压缩文件的类型
gzip_types  text/plain text/css application/x-javasacript application/javasacript application/xml;
# gzip [flag]
# flag:
# off        关闭所有的代理结果数据压缩
# expired    如果header中包含'Expires'头信息,启用压缩
# no-cache   如果header中包含'Cache-Control:no-cache'头信息,启用压缩
# no-store   如果header中包含'Cache-Control:no-store'头信息,启用压缩
# private    如果header中包含'Cache-Control:private'头信息,启用压缩
# no_last_modified  # 如果header中包含'Last_Modified'头信息,启用压缩
# no_etag    如果header中包含'ETag'头信息,启用压缩
# auth       如果header中包含'Authorization'头信息,启用压缩
# any        无条件压缩所有结果数据

# 是否在http header中添加Vary: Accept-Encoding,建议开启
gzip_vary  on;

# 禁用IE 6 gzip
gzip_disable  "MSIE [1-6]\.";

# 设置gzip压缩针对的http协议版本
gzip_http_version  1.0;

location ~* \.(png|gif)$ {
    expires  1h;    # 开启缓存并指定静态缓存时间
}


