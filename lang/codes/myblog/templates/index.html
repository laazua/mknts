
 <html lang="zh-cn">
  <head>
    <title>Sseve's blog</title>
    <meta content="text/html; charset=utf-8" http-equiv="content-type" />
    <link href="/static/default.css" rel="stylesheet">
    <link href="/static/github.css" rel="stylesheet" type="text/css" />
    <style>
      .abc {margin:0 auto; width:720px; text-align: left;}
      p{font-family:"黑体"; color: rgb(20, 54, 82);}
    </style>
  </head>
  <body style="background-color: rgba(192, 211, 223, 0.493); background: #cad1d8 url(http://coding.imweb.io/img/project/resume/bg.png) repeat;">
    <div>
      <p>
      - 好记性不如烂笔头。 <br>
      - 花开堪折直须折，莫待无花空折枝。
      </p>
    </div>
    <div class="abc"> {{ content }} </div>
  </body>
  <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
  <script>
    var getRandomColor = function() {
      return '#' + (function(color) {
        return (color += '0123456789abcdef'[Math.floor(Math.random()*16)])
          && (color.length == 6) ? color: arguments.callee(color);
      })('');
    }

    var shubiaoclick_idx = 0;
    $shubiaoclick_new = [];
    $shubiaoclick = new Array();
    if (jQuery) {

    } else {
      eval('');
    }
    jQuery(document).ready(function($) {
      $('body').click(function(e) {
        if($shubiaoclick_new.length) $shubiaoclick = $shubiaoclick_new;
        else
          $shubiaoclick = [
            '2018',
            '2019',
            '2020',
            '2021',
            '2022',
            '爱国',
            '敬业',
            '诚信',
            '和谐',
            '友善',
            '富强',
            '民主',
            '文明',
            '自由',
            '平等',
            '公正',
            '法治'
          ];
        var $i = $('<span/>').text($shubiaoclick[shubiaoclick_idx]);
        shubiaoclick_idx = (shubiaoclick_idx + 1) % $shubiaoclick.length;
        var x= e.pageX,
        y = e.pageY;
        $i.css({
          'z-index': 999999999999999999999999999999999999999999999999999999999999999999999999999,
          'top': y - 20,
          'left': x,
          'position': 'absolute',
          'font-weight': 'bold',
          'font-size': '20px',
          'color': getRandomColor()
        });
        $('html').append($i);
        $i.animate({
          'top': y - 180,
          'opacity': 0
        },
        1500,
        function() {
          $i.remove();
         });
      });
    });
  </script>
</html>
