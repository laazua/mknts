<!DOCTYPE html>
<html lang="zh">
<head>

  <title>Gkins Login</title>
  <link rel="stylesheet" href="static/css/style.css">

<body>
<div class="container-fluid vh-100">

          {{ .ErrMsg }}
        </div>
        {{ end }}

          <div class="mb-3">
            <label for="email" class="form-label">й‚®з®±</label>

          </div>
          <div class="mb-3">
            <label for="password" class="form-label">еЇ†з Ѓ</label>
            <input type="password" class="form-control form-control-lg" id="password" name="password">
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg">з™»еЅ•</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript" src="/static/css/bootstrap.min.css"></script>
</body>
</html>
