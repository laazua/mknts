<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gkins</title>
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    {{template "header.html" .}}
    <div class="row">
        <div class="col-md-3">
            {{template "sidebar.html" .}}
        </div>
        <main class="col-md-9">
            {{if eq .Page "dashboard"}} {{template "dashboard.html"}} {{end}}
            {{if eq .Page "user"}} {{template "user.html"}} {{end}}
            {{if eq .Page "task"}} {{template "task.html"}} {{end}}
        </main>
    </div>
</div>
<script src="/static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
