<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" content="text/html">
    <title>login</title>
    <!-- Bootstrap core CSS -->
    <!-- <link href="css/bootstrap.min.css"> -->
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <style>
      .bd-placeholder-img {
        font-size: 1.125rem;
        text-anchor: middle;
        -webkit-user-select: none;
        -moz-user-select: none;
        user-select: none;
      }

      @media (min-width: 768px) {
        .bd-placeholder-img-lg {
          font-size: 3.5rem;
        }
      }
    </style>
    <!-- Custom styles for this template -->
    <link href="/static/css/sign.css" rel="stylesheet" type="text/css">
  </head>
  <body class="text-center">
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.js" type="text/js"></script>
    <script src="js/bootstrap.min.js" type="text/js"></script>
    <main class="form-signin">
      <form method="POST" >
        <!-- <img class="mb-4" src="./img/bootstrap-logo.svg" alt="" width="72" height="57" type="image/png"> -->
        <h1 class="h3 mb-3 fw-normal">Go Web Tool</h1>

        <div class="form-floating">
          <input type="text" class="form-control" id="floatingUsername" placeholder="Username" name="username" data-toggle="tooltip" data-placement="top">
          <label for="floatingUsername">Username</label>
        </div>
        <div class="form-floating">
          <input type="password" class="form-control" id="floatingPassword" placeholder="Password" name="password">
          <label for="floatingPassword">Password</label>
        </div>
        <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>
        <p class="mt-5 mb-3 text-muted">&copy; 2021–2022</p>
      </form>
    </main>
    <!-- 路由跳转 -->
    {{if .Done}}
      <script>
        window.location.href="/system/dashboard"
      </script>
    {{else}}
      <script>
        $("#floatingUsername").attr("data-original-title", "用户名或密码错误")
        $('[data-toggle="tooltip"]').tooltip();
        $("#floatingUsername").tooltip("show");
        $("#floatingUsername").focus();
        var id = setTimeout(
          function () {
            $("#floatingUsername").attr("data-original-title", "");
            $("#floatingUsername").tooltip("hide");
          }, 2000)
      </script>
    {{end}}
  </body>
</html>
