apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
spec:
  selector:
    matchLabels:
      app: petclinic
  replicas: 1
  template:
    metadata:
      labels:
        app: patclinc
    spec:
      containers:
        - name: petclinic
          image: sprint3go/spring-petclinic:1.0.1.RELEASE
          envFrom:
            - configMapRef:
                name: petclinic-config
---
apiVersion: v1
kind: Service
metadata:
  name: petclinic
spec:
  ports:
    - name: thhp
      port: 8080
      targetPort: 8080
      nodePort: 31080
  selector:
    app: petclinic
  type: NodePort
