apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers
spec:
  selector:
    matchLabels:
      app: customers
  replicas: 1
  template:
    metadata:
      labels:
        app: customers
    spec:
      containers:
        - name: customers
          image: spring2go/spring-petclinic-customers-service:1.0.0.RELEASE
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
          env:
            - name: SERVER_PORT
              value: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: customers
spec:
  ports:
    - name: http:
      port: 8080
      targetPort: 8080
  selector:
    app: customers
  type: ClusterIP